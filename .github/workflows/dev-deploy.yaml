name: Test to Dev Deployment

on:
  workflow_dispatch:
    inputs:
      change_details:
        description: 'Change details (e.g., PSO, hotfix-login, etc.)'
        required: true
        type: string
      version_tag:
        description: 'Development version tag (e.g., vDEV-5.0)'
        required: true
        type: string
      ritm_ticket:
        description: 'RITM Ticket number (e.g., RITM2106103)'
        required: false
        type: string

env:
  ENV: DEV

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  deploy:
    name: Test to Dev Deployment
    runs-on: ubuntu-latest
    environment: development

    steps:
      # ── Step 1: Checkout dev and Pull Latest Changes ──────────────────────
      - name: Checkout dev and Pull Latest Changes
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      # ── Step 2: Setup Git Configuration ──────────────────────────────────────
      - name: Setup Git Configuration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Git configuration completed"

      # ── Step 3: Check for Differences Between Test and Dev ──────────────────
      - name: Check for Differences Between Test and Dev
        id: check_diff
        run: |
          git fetch origin test
          git fetch origin dev
          
          # Check if there are any differences between test and dev
          DIFF_COUNT=$(git rev-list --count origin/dev..origin/test)
          echo "Commits in test not in dev: $DIFF_COUNT"
          
          if [ "$DIFF_COUNT" -eq 0 ]; then
            echo "No differences found between test and dev branches."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "diff_count=0" >> "$GITHUB_OUTPUT"
          else
            echo "Found $DIFF_COUNT commit(s) to deploy from test to dev."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "diff_count=$DIFF_COUNT" >> "$GITHUB_OUTPUT"
          fi

      # ── Step 4: Stop Gracefully if No Changes ───────────────────────────────
      - name: No Changes Summary
        if: steps.check_diff.outputs.has_changes == 'false'
        run: |
          {
            echo "## No Changes to Deploy"
            echo ""
            echo "| Status | Details |"
            echo "|--------|---------|"
            echo "| **Result** | No deployment needed |"
            echo "| **Reason** | Test and dev branches are identical |"
            echo "| **Action** | Workflow completed successfully |"
            echo ""
            echo "**✅ The test and dev branches are already in sync.**"
            echo ""
            echo "No pull request was created because there are no changes to deploy."
            echo ""
            echo "- **Test branch**: Up to date"
            echo "- **Dev branch**: Up to date"
            echo "- **Status**: No action required"
          } >> "$GITHUB_STEP_SUMMARY"
          
          echo "Workflow completed successfully - no changes to deploy."

      # ── Step 5: Create Pull Request from test to dev (if changes exist) ────────
      - name: Create Pull Request from test to dev
        if: steps.check_diff.outputs.has_changes == 'true'
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "Creating PR directly from test branch to dev branch..."
          
          # Ensure labels exist
          echo "Creating labels if they don't exist..."
          gh label create "development" --color "28a745" --description "Development deployment" 2>/dev/null || echo "Label 'development' already exists"
          gh label create "deployment" --color "0075ca" --description "Deployment related" 2>/dev/null || echo "Label 'deployment' already exists"
          
          # Create PR body
          PR_BODY="## Development Deployment - Manual Review Required

          | Field        | Value |
          |---|---|
          | **Source Branch** | \`test\` |
          | **Target Branch** | \`dev\` |
          | **Change Details** | \`${{ inputs.change_details }}\` |
          | **Version Tag** | \`${{ inputs.version_tag }}\` |
          | **RITM Ticket** | ${{ inputs.ritm_ticket || 'N/A' }} |
          | **Commits to Deploy** | ${{ steps.check_diff.outputs.diff_count }} |
          | **Triggered by** | @${{ github.actor }} |

          ### Manual Review Required
          - [ ] Review changes from test branch
          - [ ] Verify deployment readiness
          - [ ] Check for merge conflicts
          - [ ] Stakeholder approval obtained
          - [ ] **Manual merge required - DO NOT auto-merge**

          ### Instructions
          1. Review all changes carefully
          2. Resolve any merge conflicts if present  
          3. Manually merge when ready
          4. No automatic merging will occur"

          # Try to create the PR and handle errors gracefully
          set +e  # Don't exit on error
          PR_OUTPUT=$(gh pr create \
            --repo "${{ github.repository }}" \
            --base dev \
            --head test \
            --title "DEV Deploy: ${{ inputs.change_details }} - Manual Review Required" \
            --body "$PR_BODY" \
            --label "development,deployment" 2>&1)
          
          PR_EXIT_CODE=$?
          set -e  # Re-enable exit on error
          
          if [ $PR_EXIT_CODE -eq 0 ]; then
            # PR created successfully
            PR_URL="$PR_OUTPUT"
            PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
            
            echo "pull-request-url=$PR_URL" >> "$GITHUB_OUTPUT"
            echo "pull-request-number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "pr_created=true" >> "$GITHUB_OUTPUT"
            
            echo "PR created successfully for manual review:"
            echo "URL: $PR_URL"
            echo "Number: $PR_NUMBER"
          else
            # PR creation failed - check if it's because no commits exist
            if echo "$PR_OUTPUT" | grep -q "No commits between\|Head sha can't be blank\|Base sha can't be blank"; then
              echo "No commits found between test and dev branches - skipping PR creation"
              echo "This indicates the branches are already in sync"
              echo "pr_created=false" >> "$GITHUB_OUTPUT"
              echo "pr_skip_reason=no_commits" >> "$GITHUB_OUTPUT"
            else
              echo "PR creation failed for other reasons:"
              echo "$PR_OUTPUT"
              echo "pr_created=false" >> "$GITHUB_OUTPUT"
              echo "pr_skip_reason=error" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Verify PR Creation
        if: steps.check_diff.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "=== PR Creation Status ==="
          if [ "${{ steps.create_pr.outputs.pr_created }}" = "true" ]; then
            echo "✓ Pull Request created successfully for manual review"
            echo "  URL: ${{ steps.create_pr.outputs.pull-request-url }}"
            echo "  Number: #${{ steps.create_pr.outputs.pull-request-number }}"
          elif [ "${{ steps.create_pr.outputs.pr_skip_reason }}" = "no_commits" ]; then
            echo "ℹ️ PR creation skipped - no commits between test and dev branches"
            echo "  This indicates the branches are already synchronized"
          else
            echo "⚠️ PR creation encountered an issue but workflow continues"
            echo "  Check the previous step for details"
          fi

      # ── Step 6: Manual Review PR Created Summary (if changes exist) ──────────
      - name: Manual Review PR Created Summary
        if: steps.check_diff.outputs.has_changes == 'true'
        run: |
          if [ "${{ steps.create_pr.outputs.pr_created }}" = "true" ]; then
            # PR was created successfully
            {
              echo "## Test to Dev Deployment PR Created - Manual Review Required"
              echo ""
              echo "| Step | Status |"
              echo "|------|--------|"
              echo "| Changes Detected | ✅ ${{ steps.check_diff.outputs.diff_count }} commits |"
              echo "| PR Created | #${{ steps.create_pr.outputs.pull-request-number }} |"
              echo "| Source Branch | \`test\` |"
              echo "| Target Branch | \`dev\` |"
              echo "| **Status** | **⚠️ MANUAL REVIEW REQUIRED** |"
              echo ""
              echo "**🚨 IMPORTANT: No automatic merging will occur**"
              echo ""
              echo "**Deployment Details:**"
              echo "- **Change:** ${{ inputs.change_details }}"
              echo "- **Version:** \`${{ inputs.version_tag }}\`"
              echo "- **Commits:** ${{ steps.check_diff.outputs.diff_count }}"
              echo "- **PR:** ${{ steps.create_pr.outputs.pull-request-url }}"
              echo "- **Created:** $(date)"
              echo ""
              echo "**📋 Next Steps:**"
              echo "1. Review the PR carefully"
              echo "2. Check for any merge conflicts"
              echo "3. Get stakeholder approval"
              echo "4. **Manually merge when ready**"
              echo ""
              echo "**[👉 Click here to review PR #${{ steps.create_pr.outputs.pull-request-number }}](${{ steps.create_pr.outputs.pull-request-url }})**"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            # PR creation was skipped
            {
              echo "## Test to Dev Deployment - PR Creation Skipped"
              echo ""
              echo "| Step | Status |"
              echo "|------|--------|"
              echo "| Changes Detected | ✅ ${{ steps.check_diff.outputs.diff_count }} commits |"
              echo "| PR Creation | ⏭️ Skipped |"
              echo "| Source Branch | \`test\` |"
              echo "| Target Branch | \`dev\` |"
              echo "| **Status** | **ℹ️ NO PR NEEDED** |"
              echo ""
              echo "**ℹ️ PR creation was skipped because:**"
              if [ "${{ steps.create_pr.outputs.pr_skip_reason }}" = "no_commits" ]; then
                echo "- No commits found between test and dev branches"
                echo "- The branches are already synchronized"
              else
                echo "- An issue occurred during PR creation"
                echo "- Check the workflow logs for details"
              fi
              echo ""
              echo "**Deployment Details:**"
              echo "- **Change:** ${{ inputs.change_details }}"
              echo "- **Version:** \`${{ inputs.version_tag }}\`"
              echo "- **Commits:** ${{ steps.check_diff.outputs.diff_count }}"
              echo "- **Created:** $(date)"
              echo ""
              echo "**✅ Workflow completed successfully without errors**"
            } >> "$GITHUB_STEP_SUMMARY"
          fi