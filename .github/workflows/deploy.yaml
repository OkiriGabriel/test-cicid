name: Production Deployment

on:
  workflow_dispatch:
    inputs:
      change_details:
        description: 'Change details (e.g., PSO, hotfix-login, etc.)'
        required: true
        type: string
      version_tag:
        description: 'Production version tag (e.g., vPROD-5.0)'
        required: true
        type: string
      ritm_ticket:
        description: 'RITM Ticket number (e.g., RITM2106103)'
        required: false
        type: string

env:
  ENV: PROD

permissions:
  contents: write
  pull-requests: write
  actions: read
  metadata: read

jobs:
  deploy:
    name: Production Deployment
    runs-on: ubuntu-latest
    environment: production

    steps:
      # ── Step 1: Checkout main and Pull Latest Changes ──────────────────────
      - name: Checkout main and Pull Latest Changes
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # ── Step 2: Create Production Deployment Branch ─────────────────────────
      - name: Create Production Deployment Branch
        id: create_branch
        run: |
          DATE_STR=$(date +'%b-%d-%Y_%H%M%S')
          BRANCH_NAME="PROD-Deploy_${DATE_STR}_${{ inputs.change_details }}"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> "$GITHUB_ENV"
          echo "branch_name=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete local branch if it exists
          git branch -D "${BRANCH_NAME}" 2>/dev/null || true
          
          # Delete remote branch if it exists
          git push origin --delete "${BRANCH_NAME}" 2>/dev/null || true

          git checkout -b "${BRANCH_NAME}"
          echo "✅ Created branch: ${BRANCH_NAME}"

      # ── Step 3: Merge UAT Branch into Production Branch ────────────────────
      - name: Merge UAT into Production Branch
        run: |
          git fetch origin UAT
          git merge -X theirs origin/UAT \
            --no-edit \
            -m "chore: merge UAT into ${{ env.BRANCH_NAME }} for production deployment"
          echo "✅ Merged UAT into ${{ env.BRANCH_NAME }} (theirs strategy)"

      # ── Step 4: Push Production Branch to Remote ───────────────────────────
      - name: Push Production Branch to Remote
        run: |
          git push --force-with-lease origin "${{ env.BRANCH_NAME }}"
          echo "✅ Pushed ${{ env.BRANCH_NAME }} to origin"

      # ── Step 5 & 6: Create Pull Request targeting main ─────────────────────
      - name: Create Pull Request to main
        id: create_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          branch: ${{ env.BRANCH_NAME }}
          base: main
          title: "PROD Deploy: ${{ env.BRANCH_NAME }}"
          body: |
            ## Production Deployment

            | Field        | Value |
            |---|---|
            | **Branch**   | `${{ env.BRANCH_NAME }}` |
            | **Target**   | `main` |
            | **Change Details** | `${{ inputs.change_details }}` |
            | **Version Tag** | `${{ inputs.version_tag }}` |
            | **RITM Ticket** | ${{ inputs.ritm_ticket || 'N/A' }} |
            | **Triggered by** | @${{ github.actor }} |

            ### Checklist
            - [ ] Source branch: `${{ env.BRANCH_NAME }}`
            - [ ] Destination: `main`
            - [ ] Merge conflicts resolved
            - [ ] Stakeholders reviewed
          labels: production, deployment
          draft: false

      - name: Output PR URL
        run: |
          echo "✅ Pull Request created: ${{ steps.create_pr.outputs.pull-request-url }}"

      # ── Step 7: Approval gate via GitHub Environment protection ─────────────
      # Workflow pauses here until a reviewer approves in:
      # Settings → Environments → production → Required reviewers

      # ── Step 8: Merge PR to main ────────────────────────────────────────────
      - name: Merge PR to main
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.create_pr.outputs.pull-request-number }}
          merge-method: merge
            --merge \
            --admin
          echo "✅ PR #${{ env.PR_NUMBER }} merged into main"

      # ── Step 9: Tag the build with appropriate version ─────────────────────
      - name: Checkout main and Tag Build
        run: |
          git checkout main
          git pull origin main

          TAG="${{ inputs.version_tag }}"
          MESSAGE="PROD-Deploy-$(date +'%b-%d-%Y')_${{ inputs.change_details }}"

          git tag -a "${TAG}" -m "${MESSAGE}"
          git push origin tag "${TAG}"
          echo "✅ Tagged build: ${TAG} with message '${MESSAGE}'"

      # ── Summary ─────────────────────────────────────────────────────────────
      - name: Deployment Summary
        run: |
          {
            echo "## 🚀 Production Deployment Complete"
            echo ""
            echo "| Step | Status |"
            echo "|---|---|"
            echo "| Branch created | \`${{ env.BRANCH_NAME }}\` ✅ |"
            echo "| UAT merged | ✅ |"
            echo "| PR created | ${{ env.PR_URL }} ✅ |"
            echo "| Merged to main | ✅ |"
            echo "| Tagged | \`${{ inputs.version_tag }}\` ✅ |"
          } >> "$GITHUB_STEP_SUMMARY"