name: Production Deployment v2

on:
  workflow_dispatch:
    inputs:
      change_details:
        description: 'Change details (e.g., PSO, hotfix-login, etc.)'
        required: true
        type: string
      version_tag:
        description: 'Production version tag (e.g., vPROD-5.0)'
        required: true
        type: string
      ritm_ticket:
        description: 'RITM Ticket number (e.g., RITM2106103)'
        required: false
        type: string

env:
  ENV: PROD

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  deploy:
    name: Production Deployment
    runs-on: ubuntu-latest
    environment: production

    steps:
      # ── Step 1: Checkout main and Pull Latest Changes ──────────────────────
      - name: Checkout main and Pull Latest Changes
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # ── Step 2: Create Production Deployment Branch ─────────────────────────
      - name: Create Production Deployment Branch
        id: create_branch
        run: |
          DATE_STR=$(date +'%b-%d-%Y_%H%M%S')
          BRANCH_NAME="PROD-Deploy_${DATE_STR}_${{ inputs.change_details }}"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> "$GITHUB_ENV"
          echo "branch_name=${BRANCH_NAME}" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete local branch if it exists
          git branch -D "${BRANCH_NAME}" 2>/dev/null || true
          
          # Delete remote branch if it exists
          git push origin --delete "${BRANCH_NAME}" 2>/dev/null || true

          git checkout -b "${BRANCH_NAME}"
          echo "Created branch: ${BRANCH_NAME}"

      # ── Step 3: Merge UAT Branch into Production Branch ────────────────────
      - name: Merge UAT into Production Branch
        run: |
          git fetch origin UAT
          git merge -X theirs origin/UAT \
            --no-edit \
            -m "chore: merge UAT into ${{ env.BRANCH_NAME }} for production deployment"
          echo "Merged UAT into ${{ env.BRANCH_NAME }} (theirs strategy)"

      # ── Step 4: Push Production Branch to Remote ───────────────────────────
      - name: Push Production Branch to Remote
        run: |
          git push --force-with-lease origin "${{ env.BRANCH_NAME }}"
          echo "Pushed ${{ env.BRANCH_NAME }} to origin"

      # ── Step 5 & 6: Create Pull Request targeting main ─────────────────────
      - name: Create Pull Request to main
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "Creating PR using gh CLI..."
          
          # Create PR body
          PR_BODY="## Production Deployment

          | Field        | Value |
          |---|---|
          | **Branch**   | \`${{ env.BRANCH_NAME }}\` |
          | **Target**   | \`main\` |
          | **Change Details** | \`${{ inputs.change_details }}\` |
          | **Version Tag** | \`${{ inputs.version_tag }}\` |
          | **RITM Ticket** | ${{ inputs.ritm_ticket || 'N/A' }} |
          | **Triggered by** | @${{ github.actor }} |

          ### Checklist
          - [ ] Source branch: \`${{ env.BRANCH_NAME }}\`
          - [ ] Destination: \`main\`
          - [ ] Merge conflicts resolved
          - [ ] Stakeholders reviewed"

          # Create the PR
          PR_URL=$(gh pr create \
            --repo "${{ github.repository }}" \
            --base main \
            --head "${{ env.BRANCH_NAME }}" \
            --title "PROD Deploy: ${{ env.BRANCH_NAME }}" \
            --body "$PR_BODY" \
            --label "production,deployment")

          # Extract PR number from URL
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$')
          
          # Set outputs
          echo "pull-request-url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "pull-request-number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          
          echo "PR created successfully:"
          echo "URL: $PR_URL"
          echo "Number: $PR_NUMBER"

      - name: Verify PR Creation and Repository Settings
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "=== PR Creation Status ==="
          if [ -n "${{ steps.create_pr.outputs.pull-request-url }}" ]; then
            echo "✓ Pull Request created successfully"
            echo "  URL: ${{ steps.create_pr.outputs.pull-request-url }}"
            echo "  Number: #${{ steps.create_pr.outputs.pull-request-number }}"
          else
            echo "✗ PR creation failed"
            echo "Checking for existing PRs on this branch..."
            gh pr list --head "${{ env.BRANCH_NAME }}" --repo "${{ github.repository }}" || echo "No PRs found"
            exit 1
          fi
          
          echo ""
          echo "=== Repository Auto-Merge Settings ==="
          # Check if auto-merge is enabled in repository
          REPO_INFO=$(gh api repos/${{ github.repository }} --jq '.allow_auto_merge')
          if [ "$REPO_INFO" = "true" ]; then
            echo "✓ Auto-merge is enabled in repository settings"
          else
            echo "✗ Auto-merge is NOT enabled in repository settings"
            echo "  Go to Settings → General → Pull Requests → Allow auto-merge"
          fi
          
          echo "Preparing for merge attempt..."

      # ── Step 7: Brief pause to ensure PR is ready ──────────────────────────
      - name: Wait for PR to be ready
        run: |
          echo "Waiting 10 seconds for PR to be fully processed..."
          sleep 10

      # ── Step 8: Attempt Automated Merge to Main ────────────────────────────
      - name: Try Auto-Merge PR to Main
        id: auto_merge
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "Attempting to enable auto-merge for PR #${{ steps.create_pr.outputs.pull-request-number }}"
          
          # Try to enable auto-merge using gh CLI
          if gh pr merge "${{ steps.create_pr.outputs.pull-request-number }}" \
            --repo "${{ github.repository }}" \
            --merge \
            --auto; then
            echo "Auto-merge enabled successfully"
            echo "outcome=success" >> "$GITHUB_OUTPUT"
          else
            echo "Auto-merge failed - will wait for manual merge"
            echo "outcome=failure" >> "$GITHUB_OUTPUT"
          fi

      # ── Step 9: Check Auto-Merge Status and Wait for Merge ─────────────────
      - name: Wait for PR Merge (Auto or Manual)
        id: wait_merge
        run: |
          echo "Checking auto-merge status..."
          
          # Check if auto-merge was successful
          if [ "${{ steps.auto_merge.outcome }}" = "success" ]; then
            echo "Auto-merge enabled successfully"
            echo "Waiting for automatic merge to complete..."
            WAIT_MESSAGE="auto-merge"
          else
            echo "Auto-merge failed or not available"
            echo "**MANUAL MERGE REQUIRED**"
            echo ""
            echo "Please manually merge the PR: ${{ steps.create_pr.outputs.pull-request-url }}"
            echo "The workflow will continue automatically once merged."
            WAIT_MESSAGE="manual merge"
          fi
          
          echo "wait_type=${WAIT_MESSAGE}" >> "$GITHUB_OUTPUT"
          
          # If auto-merge failed, show manual merge instructions
          if [ "${{ steps.auto_merge.outcome }}" != "success" ]; then
            {
              echo "## Manual Merge Required"
              echo ""
              echo "Auto-merge could not be enabled. Please manually merge the PR to continue:"
              echo ""
              echo "**[Click here to merge PR #${{ steps.create_pr.outputs.pull-request-number }}](${{ steps.create_pr.outputs.pull-request-url }})**"
              echo ""
              echo "The workflow will automatically continue with tagging once the PR is merged."
              echo ""
              echo "| Field | Value |"
              echo "|-------|-------|"
              echo "| PR Number | #${{ steps.create_pr.outputs.pull-request-number }} |"
              echo "| Branch | \`${{ env.BRANCH_NAME }}\` |"
              echo "| Status | Waiting for manual merge |"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          
          # Wait for PR to be merged (either auto or manual)
          echo "Waiting for ${WAIT_MESSAGE} of PR #${{ steps.create_pr.outputs.pull-request-number }}..."
          
          MERGED=false
          # Wait up to 30 minutes (180 attempts * 10 seconds)
          for i in {1..180}; do
            sleep 10
            
            # Check if PR is merged using GitHub API
            MERGE_STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/pulls/${{ steps.create_pr.outputs.pull-request-number }}" \
              | jq -r '.merged')
            
            if [ "$MERGE_STATUS" = "true" ]; then
              echo "PR #${{ steps.create_pr.outputs.pull-request-number }} has been merged!"
              MERGED=true
              break
            fi
            
            # Show different messages based on merge type
            if [ "${{ steps.auto_merge.outcome }}" = "success" ]; then
              echo "Waiting for auto-merge... (attempt $i/180)"
            else
              if [ $((i % 6)) -eq 0 ]; then  # Show message every minute
                echo "Waiting for manual merge... (${i}0 seconds elapsed)"
                echo "   Please merge PR: ${{ steps.create_pr.outputs.pull-request-url }}"
              fi
            fi
          done
          
          if [ "$MERGED" = "false" ]; then
            echo "Timeout waiting for PR merge after 30 minutes."
            echo "Please merge the PR manually: ${{ steps.create_pr.outputs.pull-request-url }}"
            exit 1
          fi

      # ── Step 10: Create Production Tag ──────────────────────────────────────
      - name: Create Production Tag
        run: |
          # Checkout main and pull latest
          git checkout main
          git pull origin main
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create tag
          TAG="${{ inputs.version_tag }}"
          MESSAGE="PROD-Deploy-$(date +'%b-%d-%Y')_${{ inputs.change_details }}"
          
          git tag -a "${TAG}" -m "${MESSAGE}"
          git push origin tag "${TAG}"
          
          echo "Tagged production build: ${TAG}"
          echo "Tag message: ${MESSAGE}"

      # ── Step 11: Deployment Complete Summary ────────────────────────────────
      - name: Deployment Complete Summary
        run: |
          # Determine merge method for display
          if [ "${{ steps.auto_merge.outcome }}" = "success" ]; then
            MERGE_METHOD="Auto-merged"
          else
            MERGE_METHOD="Manually merged"
          fi
          
          {
            echo "## Production Deployment Complete"
            echo ""
            echo "| Step | Status |"
            echo "|------|--------|"
            echo "| Branch Created | \`${{ env.BRANCH_NAME }}\` |"
            echo "| UAT Merged | Completed |"
            echo "| PR Created | #${{ steps.create_pr.outputs.pull-request-number }} |"
            echo "| PR Merged | ${MERGE_METHOD} |"
            echo "| Production Tagged | \`${{ inputs.version_tag }}\` |"
            echo ""
            echo "**Deployment Details:**"
            echo "- **Change:** ${{ inputs.change_details }}"
            echo "- **Version:** \`${{ inputs.version_tag }}\`"
            echo "- **Branch:** \`${{ env.BRANCH_NAME }}\`"
            echo "- **PR:** ${{ steps.create_pr.outputs.pull-request-url }}"
            echo "- **Merge Method:** ${{ steps.wait_merge.outputs.wait_type }}"
            echo "- **Completed:** $(date)"
            echo ""
            echo "**Production deployment successful!**"
          } >> "$GITHUB_STEP_SUMMARY"
